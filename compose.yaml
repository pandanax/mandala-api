# Локальный PostgreSQL для разработки (тикет 2).
# Запуск: podman compose up -d (см. README).
# Образ: docker.io/library/... — реестр OCI, подходит для Podman без Docker Desktop.
# Переменные — из .env (см. .env.example); пароли в git не коммитить.

services:
  postgres:
    image: docker.io/library/postgres:16.6-alpine
    container_name: mandala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mandala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mandala}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mandala_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mandala} -d ${POSTGRES_DB:-mandala}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Опционально: векторное хранилище для RAG (тикет 16). Запуск: podman compose up -d qdrant
  qdrant:
    image: docker.io/qdrant/qdrant:v1.12.5
    container_name: mandala-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - mandala_qdrant_data:/qdrant/storage

volumes:
  mandala_pg_data:
  mandala_qdrant_data:
